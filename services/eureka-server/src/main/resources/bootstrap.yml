spring:
  application:
    name: eureka-server

  cloud:
    config:
      uri: http://localhost:8888 # Config server URL
      fail-fast: true # Crash at startup if config-server is not reachable
      retry:
        initial-interval: 1000 # wait 1s before the first retry
        max-interval: 5000 # maximum wait between each retries
        max-attempts: 6 # try 6 times before giving up
        multiplier: 1.2 # wait time will be multiplied by this value for each retry
