# Config Server
# It serves externalized configuration to all microservices

spring:
  application:
    name: config-server
  profiles:
    # native → reads config from classpath (dev)
    # git    → reads config from a remote Git repo (prod)
    active: native

  cloud:
    config:
      server:
        # Dev: classpath-based config
        # Resolves per-service configs from src/main/resources/config/{application}/
        # e.g. eureka-server → classpath:/config/eureka-server/
        native:
          search-locations: classpath:/config/{application}

        # Prod: Git-based config
#        git:
#          uri: https://github.com/ripanbaidya/iconic-config
#          search-paths: '{application}'  # per-service subdirectory in the repo
#          default-label: main
#          skip-ssl-validation: false
#          timeout: 5
#          username:
#          password:

    # Spring Cloud Bus — broadcasts /actuator/busrefresh to all services via RabbitMQ
    # Usage: When microservice instances are running and a config property is changed at runtime,
    # hitting the /actuator/busrefresh endpoint on any instance propagates the config change to all
    # other instances of that microservice.
    bus:
      enabled: true

  # RabbitMQ - transport for Spring Cloud Bus config refresh events
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# Server port
server:
  port: 8888 # default port of config server

management:
  endpoints:
    web:
      exposure:
        # busrefresh → propagates config reload to all connected services
        # refresh    → reloads config on this server only
        include: health, info, busrefresh, refresh
